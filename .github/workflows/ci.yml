name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-15]
        build_type: [Debug, Release]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.*'
          modules: qtbase qtdeclarative

      - name: Build doctest
        run: |
          git clone --depth 1 https://github.com/doctest/doctest.git
          cmake -S doctest -B doctest/build -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=doctest/install
          cmake --install doctest/build

      - name: Configure
        run: >
          cmake -B build
          -DQT=ON
          -DBUILD_TEST=ON
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
          -DCMAKE_PREFIX_PATH="doctest/install"

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure
